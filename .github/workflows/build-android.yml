name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        android-accept-licenses: true
        cmdline-tools-version: '9.0'
        api-level: 30
        build-tools-version: '30.0.3'
        ndk-version: '26.2.11394342'
    
    - name: Build Android APK
      run: |
        cd android
        .\gradlew.bat clean assembleDebug --stacktrace
        cd ..
    
    - name: Rename APK
      run: |
        mv android\app\build\outputs\apk\debug\app-debug.apk budgetguard.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-apk
        path: budgetguard.apk
        retention-days: 30
