name: Build and Release Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Sync Capacitor to Android
      run: npx cap sync android
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Verify Java Version
      run: java -version
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-36 build-tools;36.0.0'
    
    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        cd ..
    
    - name: Rename Debug APK
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk budgetguard-debug.apk
    
    - name: Upload Debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-debug-apk
        path: budgetguard-debug.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Sync Capacitor to Android
      run: npx cap sync android
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-36 build-tools;36.0.0'
    
    - name: Decode Keystore
      env:
        KEYSTORE_ENCODED: ${{ secrets.KEYSTORE_ENCODED }}
      run: |
        python3 -c "
        import base64, os
        encoded = os.environ['KEYSTORE_ENCODED']
        decoded = base64.b64decode(''.join(encoded.split()))
        open('android/app/budgetguard.keystore', 'wb').write(decoded)
        print(f'Keystore decoded successfully: {len(decoded)} bytes')
        "
    
    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease \
          -Pandroid.injected.signing.store.file=app/budgetguard.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
          --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        cd ..
    
    - name: Get version from tag
      id: version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Rename Release APK
      run: |
        mv android/app/build/outputs/apk/release/app-release.apk budgetguard-v${{ steps.version.outputs.version }}.apk
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: budgetguard-v${{ steps.version.outputs.version }}.apk
        draft: false
        prerelease: false
        generate_release_notes: true
        name: "BudgetGuard v${{ steps.version.outputs.version }}"
        body: |
          ## 📱 BudgetGuard v${{ steps.version.outputs.version }}

          Premium Offline-First Financial Intelligence app for Android.

          ### Download
          Download the APK below and install on your Android device.
          > **Note:** You may need to enable *Install from unknown sources* in your Android settings.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
