name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        android-accept-licenses: true
        cmdline-tools-version: '11.0'
        api-level: 36
        build-tools-version: '36.0.0'
        ndk-version: '27.1.112893'
    
    - name: Set gradlew as executable
      run: chmod +x android/gradlew
      
    - name: Install Capacitor CLI globally
      run: npm install -g @capacitor/cli @capacitor/core
      
    - name: Sync Capacitor
      run: npx cap sync android
      
    - name: Build Android APK
      run: |
        cd android
        ./gradlew clean assembleDebug --stacktrace --info
        cd ..
    
    - name: Rename APK
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk budgetguard.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v3
      with:
        name: budgetguard-apk
        path: budgetguard.apk
        retention-days: 30
