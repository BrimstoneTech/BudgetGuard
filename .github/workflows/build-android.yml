name: Build and Release Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Sync Capacitor to Android
      run: npx cap sync android
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Verify Java Version
      run: java -version
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-36 build-tools;36.0.0'
    
    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        cd ..
    
    - name: Rename Debug APK
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk budgetguard-debug.apk
    
    - name: Upload Debug APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-debug-apk
        path: budgetguard-debug.apk
        retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Sync Capacitor to Android
      run: npx cap sync android
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-36 build-tools;36.0.0'
    
    - name: Decode Keystore
      env:
        KEYSTORE_ENCODED: ${{ secrets.KEYSTORE_ENCODED }}
      run: |
        echo "$KEYSTORE_ENCODED" | base64 --decode > android/app/budgetguard.keystore
    
    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease \
          -Pandroid.injected.signing.store.file=app/budgetguard.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
          --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        cd ..
    
    - name: Rename Release APK
      run: |
        mv android/app/build/outputs/apk/release/app-release.apk budgetguard-${GITHUB_REF#refs/tags/}.apk
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: budgetguard-*.apk
        draft: true
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
