name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Build PWA
      run: npm run build
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        android-accept-licenses: true
        cmdline-tools-version: '11.0'
        emulator-target: 'google_apis;30'
        api-level: 36
        build-tools-version: '36.0.0'
        ndk-version: '27.1.112893'
        cmake-version: '3.22.1'
    
    - name: Accept Android licenses
      run: yes | sdkmanager --licenses
    
    - name: Set gradlew as executable
      run: chmod +x android/gradlew
      
    - name: Install Capacitor dependencies
      run: |
        npm install -g @capacitor/cli @capacitor/core
        npx cap sync android
    
    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        cd ..
    
    - name: Rename APK
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk budgetguard.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-apk
        path: budgetguard.apk
        retention-days: 30
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        files: budgetguard.apk
        name: BudgetGuard APK
        tag_name: v1.0.0-${{ github.run_number }}
        body: |
          Automated build of BudgetGuard Android APK
          
          Download the APK file below and install it on your Android device.
          
          Features:
          - Uganda-focused expense tracking
          - MTN MoMo and Airtel Money SMS auto-import
          - Offline-first with IndexedDB
          - Privacy-first design
          - 13 Uganda-specific categories
          - Budget envelopes and savings goals
          
          Note: This is a debug build. For production, build locally with your own keystore.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
