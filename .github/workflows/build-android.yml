name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
    
    - name: Sync Capacitor to Android
      run: npx cap sync android
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Verify Java Version
      run: java -version
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '12.0'
        accept-android-sdk-licenses: true
        packages: 'platforms;android-36 build-tools;36.0.0'
    
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.java.home=$JAVA_HOME
        cd ..
    
    - name: Rename APK
      run: |
        mv android/app/build/outputs/apk/debug/app-debug.apk budgetguard.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-apk
        path: budgetguard.apk
        retention-days: 30
