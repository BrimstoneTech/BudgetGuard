name: Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Get version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION=${{ github.event.inputs.version }}
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"
      
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
      
    - name: Build PWA
      run: npm run build
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      with:
        android-accept-licenses: true
        cmdline-tools-version: '9.0'
        api-level: 30
        build-tools-version: '30.0.3'
        ndk-version: '26.2.11394342'
    
    - name: Update app version
      run: |
        sed -i "s/versionName \"1.0\"/versionName \"${{ steps.version.outputs.version }}\"/g" android/app/build.gradle
        cat android/app/build.gradle | grep versionName
    
    - name: Build release APK (unsigned)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean assembleRelease --stacktrace
        cd ..
    
    - name: Sign APK
      uses: r0adkll/sign-android-release@v1
      id: sign_app
      with:
        releaseDirectory: android/app/build/outputs/apk/release
        signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        alias: ${{ secrets.ANDROID_KEY_ALIAS }}
        keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
      env:
        BUILD_TOOLS_VERSION: '30.0.3'
    
    - name: Rename signed APK
      run: |
        mv ${{ steps.sign_app.outputs.signedReleaseFile }} budgetguard-${{ steps.version.outputs.version }}-signed.apk
    
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: budgetguard-release-apk
        path: budgetguard-${{ steps.version.outputs.version }}-signed.apk
        retention-days: 30
    
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: budgetguard-${{ steps.version.outputs.version }}-signed.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Publish release summary
      run: |
        echo "## 📱 BudgetGuard v${{ steps.version.outputs.version }} Released" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ Debug APK build completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Release APK built and signed" >> $GITHUB_STEP_SUMMARY
        echo "✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Download" >> $GITHUB_STEP_SUMMARY
        echo "[Download Release APK](https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
